<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio Profesional</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

    <div class="max-w-4xl mx-auto px-4 py-12">
        
        <header class="text-center mb-12">
            <img id="profile-img" src="" alt="Foto de Perfil" class="w-32 h-32 rounded-full mx-auto border-4 border-indigo-500 object-cover shadow-lg mb-4 hidden">
            <h1 id="fullname" class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-2">Cargando...</h1>
            <p id="comment" class="text-slate-400 max-w-xl mx-auto italic text-sm md:text-base mb-6"></p>
            
            <div id="social-media" class="flex justify-center gap-4 flex-wrap"></div>
        </header>

        <hr class="border-slate-800 mb-12">

        <main>
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2 text-indigo-400">
                <i class="fa-solid fa-folder-open"></i> Proyectos y Prácticas
            </h2>
            
            <div id="portfolio-grid" class="grid gap-6 md:grid-cols-2"></div>
        </main>
        
    </div>

    <script>
        const getIcon = (title) => {
            const t = title.toLowerCase();
            if (t.includes('linkedin')) return 'fa-brands fa-linkedin';
            if (t.includes('github')) return 'fa-brands fa-github';
            if (t.includes('instagram')) return 'fa-brands fa-instagram';
            return 'fa-solid fa-link';
        };

        async function loadPortfolio() {
            try {
                const response = await fetch('Mi_portafolio.json');
                const data = await response.json();

                document.getElementById('fullname').textContent = data.fullname;
                document.getElementById('comment').textContent = `"${data.comment}"`;
                
                if (data.image_profile) {
                    const img = document.getElementById('profile-img');
                    img.src = data.image_profile;
                    img.classList.remove('hidden');
                }

                const socialContainer = document.getElementById('social-media');
                data.social_media.forEach(net => {
                    const btn = document.createElement('a');
                    btn.href = net.url;
                    btn.target = '_blank';
                    btn.className = 'flex items-center gap-2 bg-slate-800 hover:bg-indigo-600 text-slate-200 hover:text-white px-4 py-2 rounded-full transition-all text-sm font-medium shadow-sm';
                    btn.innerHTML = `<i class="${getIcon(net.title)} text-lg"></i> ${net.title}`;
                    socialContainer.appendChild(btn);
                });

                const grid = document.getElementById('portfolio-grid');
                data.portfolio.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'bg-slate-800/50 rounded-2xl border border-slate-800 p-5 hover:border-slate-700 transition-all flex flex-col justify-between shadow-md';
                    
                    let extraImagesHtml = '';
                    if (project.images && project.images.length > 0) {
                        extraImagesHtml = `
                            <div class="mt-3">
                                <p class="text-xs text-slate-500 mb-1 font-semibold uppercase tracking-wider">Capturas adicionales:</p>
                                <div class="flex gap-2 overflow-x-auto pb-1">
                                    ${project.images.map(img => `
                                        <a href="${img.image_url}" target="_blank" class="block shrink-0">
                                            <img src="${img.image_url}" class="w-16 h-12 object-cover rounded border border-slate-700 hover:border-indigo-400 transition-all" alt="Captura">
                                        </a>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <div>
                            <div class="w-full h-44 overflow-hidden rounded-xl mb-4 bg-slate-900 border border-slate-800">
                                <img src="${project.image_url}" alt="${project.title}" class="w-full h-full object-cover hover:scale-105 transition-all duration-300" onerror="this.src='https://placehold.co/600x400/1e293b/94a3b8?text=Ver+Captura'">
                            </div>
                            <h3 class="text-lg font-bold text-slate-100 mb-2">${project.title}</h3>
                            <p class="text-sm text-slate-400 leading-relaxed">${project.description}</p>
                        </div>
                        ${extraImagesHtml}
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                document.getElementById('fullname').textContent = "Error al cargar los datos.";
            }
        }

        window.addEventListener('DOMContentLoaded', loadPortfolio);
    </script>
</body>
</html>
