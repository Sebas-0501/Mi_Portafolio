<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastian Gutierrez | Portafolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="portfolio-body">

    <div class="bg-grid-pattern"></div>

    <div class="portfolio-container">
        
        <header class="profile-header">
            <div class="profile-img-container">
                <div class="profile-img-glow"></div>
                <img id="profile-img" src="" alt="Foto de Perfil" class="profile-img hidden">
            </div>

            <div class="profile-title-block">
                <h1 id="fullname" class="profile-name">Cargando...</h1>
                <p class="profile-subtitle">Ingeniería de Sistemas Informáticos</p>
            </div>

            <div class="profile-quote-block">
                <span class="quote-mark-open">“</span>
                <p id="comment" class="profile-comment"></p>
                <span class="quote-mark-close">”</span>
            </div>
            
            <div id="social-media" class="social-container"></div>
        </header>

        <div class="section-divider">
            <div class="divider-line"></div>
            <div class="divider-text-wrapper">
                <span class="divider-text">Sistemas & Infraestructura</span>
            </div>
        </div>

        <main>
            <h2 class="main-title">
                <span class="title-icon-wrapper">
                    <i class="fa-solid fa-terminal text-sm"></i>
                </span> 
                Bitácora de Prácticas y Proyectos
            </h2>
            
            <div id="portfolio-grid" class="portfolio-grid"></div>
        </main>
        
        <footer class="portfolio-footer">
            <p>© 2026 • Diseñado con CSS Independiente y Tailwind v4</p>
        </footer>
    </div>

    <script>
        const getIcon = (title) => {
            const t = title.toLowerCase();
            if (t.includes('linkedin')) return 'fa-brands fa-linkedin-in';
            if (t.includes('github') || t.includes('portafolio')) return 'fa-brands fa-github';
            if (t.includes('instagram')) return 'fa-brands fa-instagram';
            return 'fa-solid fa-arrow-up-right-from-square';
        };

        async function loadPortfolio() {
            try {
                const response = await fetch('Mi_portafolio.json');
                const data = await response.json();

                document.getElementById('fullname').textContent = data.fullname;
                document.getElementById('comment').textContent = data.comment;
                
                if (data.image_profile) {
                    const img = document.getElementById('profile-img');
                    img.src = data.image_profile.replace("imgur.com/a/", "i.imgur.com/") + ".png";
                    img.classList.remove('hidden');
                }

                const socialContainer = document.getElementById('social-media');
                data.social_media.forEach(net => {
                    const btn = document.createElement('a');
                    btn.href = net.url;
                    btn.target = '_blank';
                    btn.className = 'social-btn';
                    btn.innerHTML = `<i class="${getIcon(net.title)} icon-color"></i> ${net.title}`;
                    socialContainer.appendChild(btn);
                });

                const grid = document.getElementById('portfolio-grid');
                data.portfolio.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    
                    let extraImagesHtml = '';
                    if (project.images && project.images.length > 0) {
                        extraImagesHtml = `
                            <div class="extra-images-section">
                                <p class="extra-images-title">
                                    <i class="fa-solid fa-images"></i> Evidencias adicionales:
                                </p>
                                <div class="extra-images-scroll">
                                    ${project.images.map(img => `
                                        <a href="${img.image_url}" target="_blank" class="thumb-link">
                                            <img src="${img.image_url}" class="thumb-img" alt="Evidencia">
                                            <div class="thumb-overlay">
                                                <i class="fa-solid fa-magnifying-glass text-[10px] text-white"></i>
                                            </div>
                                        </a>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <div class="project-content">
                            <div class="project-img-wrapper">
                                <img src="${project.image_url}" alt="${project.title}" class="project-main-img" onerror="this.src='https://placehold.co/600x400/0f172a/94a3b8?text=Ver+Captura'">
                                <a href="${project.image_url}" target="_blank" class="project-expand-btn">
                                    <i class="fa-solid fa-expand text-xs"></i>
                                </a>
                            </div>
                            
                            <div class="project-info">
                                <h3 class="project-title">
                                    <span class="project-dot">■</span> ${project.title}
                                </h3>
                                <p class="project-description">${project.description}</p>
                            </div>
                        </div>
                        ${extraImagesHtml}
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                document.getElementById('fullname').textContent = "Error al conectar los datos.";
            }
        }

        window.addEventListener('DOMContentLoaded', loadPortfolio);
    </script>
</body>
</html>
